name: bunny_learn
description: BunnyLearn - Kids English Learning App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_tts: ^4.0.2
  audioplayers: ^6.0.0
  shared_preferences: ^2.2.2
  animate_do: ^3.3.4
  lottie: ^3.0.0
  google_fonts: ^6.1.0
  provider: ^6.1.1
  confetti: ^0.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/audio/
